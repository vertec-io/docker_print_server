# =============================================================================
# Docker Print Server - Docker Compose Configuration
# =============================================================================
#
# Services (all in one container):
#   - CUPS:              Print server (http://<host>:631)
#   - Samba:             Windows SMB printer sharing (\\<host>\printers)
#   - wsdd:              Windows network discovery (WSD protocol)
#   - DirectPrintClient: Odoo integration (http://<host>:8888)
#
# Usage:
#   docker compose up -d --build    # Build and start
#   docker compose logs -f          # View logs
#   docker compose down             # Stop and remove
#   docker compose restart          # Restart services
#
# Configuration:
#   Copy .env.example to .env and modify settings as needed.
#
# NETWORKING (host mode):
#   This deploys with host networking (`network_mode: host`), which is the
#   correct mode for a Linux print-server VM and is REQUIRED for:
#     - Windows WSD / mDNS (Bonjour) auto-discovery so end users can find the
#       server and printers on the LAN (3702/udp, 5357, multicast).
#     - CUPS seeing REAL client IPs (its web-interface session/CSRF auth and
#       its access-control rules behave correctly with real clients; behind a
#       Docker bridge every client looks like the bridge gateway).
#   The container binds these host ports directly: 631 (CUPS), 8888 (DirectPrint),
#   139/445 (Samba), 3702-udp/5357 (wsdd), 9100 (raw). Make sure the host firewall
#   allows them and nothing else on the host is already bound to them.
#
#   On Windows/macOS hosts (development only) host networking is not supported the
#   same way: remove `network_mode: host` and use the commented bridge + published
#   ports block at the bottom of this file instead.
#
#   SELinux hosts (RHEL/AlmaLinux/Rocky): before first start, relabel the bind
#   mounts so the container can read them:
#     chcon -Rt container_file_t ./config ./data
# =============================================================================

services:
  print-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Credentials (override via .env file)
        CUPS_ADMIN_PASSWORD: ${CUPS_ADMIN_PASSWORD:-adminpassword}
        SAMBA_PASSWORD: ${SAMBA_PASSWORD:-printers}
        SAMBA_USER: ${SAMBA_USER:-printuser}

    container_name: print-server
    hostname: print-server
    restart: unless-stopped

    # Host networking (Linux). See the NETWORKING note in the header.
    # For Windows/macOS dev, remove this line and use the bridge block below.
    network_mode: host

    environment:
      - CUPS_WEBINTERFACE=yes
      - CUPS_SERVER_NAME=${CUPS_SERVER_NAME:-Print Server}
      - TZ=${TZ:-UTC}

    volumes:
      # =======================================================================
      # Configuration Files (templates, read-only where possible)
      # =======================================================================
      # CUPS main configuration
      - ./config/cups/cupsd.conf:/etc/cups/cupsd.conf:ro

      # Samba configuration
      - ./config/samba/smb.conf:/etc/samba/smb.conf:ro

      # =======================================================================
      # Runtime Data (persisted, read-write)
      # =======================================================================
      # CUPS printer definitions and subscriptions
      - ./data/cups:/etc/cups/ppd
      - ./data/cups/printers.conf:/etc/cups/printers.conf
      - ./data/cups/subscriptions.conf:/etc/cups/subscriptions.conf

      # Print queue spool
      - ./data/spool:/var/spool/cups

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # =========================================================================
    # USB Printer Support (Optional)
    # =========================================================================
    # Uncomment these lines to allow USB device access for USB-connected printers
    # Note: This requires the host to have USB devices passed through
    # privileged: true
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb

# =============================================================================
# Windows / macOS (development) alternative: bridge networking + published ports
# -----------------------------------------------------------------------------
# Host networking is Linux-only. On Windows/macOS, REMOVE `network_mode: host`
# above and uncomment everything below (the top-level `networks:` block and add
# the `ports:` + `networks:` keys back under the service).
#
# networks:
#   printnet:
#     name: printnet
#     driver: bridge
#
#   # ...and under `print-server:` add:
#     ports:
#       - "8888:8888"                       # DirectPrintClient (Odoo)
#       - "631:631"                         # CUPS
#       - "${SMB_NETBIOS_PORT:-1139}:139"   # Samba NetBIOS (use 139 on Linux)
#       - "${SMB_PORT:-1445}:445"           # Samba SMB     (use 445 on Linux)
#       - "3702:3702/udp"                   # wsdd WS-Discovery
#       - "5357:5357"                       # wsdd HTTP
#       - "9100:9100"                       # Raw / JetDirect
#     networks:
#       - printnet
# =============================================================================
